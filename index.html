<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode 可视化工具</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>
    <div class="header">
        <h1>LeetCode 可视化工具</h1>
        <div class="toolbar">
            <span id="stats-display">节点: 0 | 边: 0</span>
            <button id="exportBtn" class="tool-btn">导出 PNG</button>
            <button id="clearBtn" class="tool-btn secondary">清空</button>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <div class="tab-buttons">
                <button id="tabBtn0" class="tab-button active">通用图/树</button>
                <button id="tabBtn1" class="tab-button">二叉树</button>
                <button id="tabBtn2" class="tab-button">矩阵</button>
                <button id="tabBtn3" class="tab-button">链表</button>
                <button id="tabBtn4" class="tab-button">栈 &amp; 队列</button>
            </div>

            <!-- Tab 0: 通用图/树 -->
            <div id="tabContent0" class="tab-content active">
                <div class="options-grid">
                    <fieldset>
                        <legend>图表示法</legend>
                        <div class="format-selector">
                            <label><input type="radio" name="graphFormat" value="edgeList" checked> 边列表</label>
                            <label><input type="radio" name="graphFormat" value="adjList"> 邻接列表</label>
                        </div>
                    </fieldset>
                    <fieldset>
                        <legend>图类型</legend>
                        <div class="format-selector">
                            <label><input type="radio" name="graphType" value="undirected" checked> 无向图</label>
                            <label><input type="radio" name="graphType" value="directed"> 有向图</label>
                        </div>
                    </fieldset>
                </div>
                <fieldset>
                    <legend>节点索引</legend>
                    <div class="format-selector">
                        <label><input type="radio" name="indexMode" value="0-indexed" checked> 0-indexed</label>
                        <label><input type="radio" name="indexMode" value="1-indexed"> 1-indexed</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>节点权重</legend>
                    <div class="format-selector">
                        <label><input type="radio" name="hasNodeWeights" value="no" checked> 无</label>
                        <label><input type="radio" name="hasNodeWeights" value="yes"> 有</label>
                    </div>
                </fieldset>
                <div id="nodeWeightsGroup" class="input-group" style="display:none;">
                    <label>节点权重值</label>
                    <textarea id="nodeWeightsInput" rows="2" placeholder="[10, 20, 30, ...]"></textarea>
                </div>
                <div id="edgeWeightsGroup">
                    <fieldset>
                        <legend>边权重</legend>
                        <div class="format-selector">
                            <label><input type="radio" name="edgeWeightSource" value="none" checked> 无</label>
                            <label><input type="radio" name="edgeWeightSource" value="separate"> 独立列表</label>
                            <label><input type="radio" name="edgeWeightSource" value="thirdElement"> 第三元素</label>
                        </div>
                    </fieldset>
                    <div id="edgeWeightsInputWrap" class="input-group" style="display:none;">
                        <label>边权重值</label>
                        <textarea id="edgeWeightsInput" rows="2" placeholder="[5, 8, 2, ...]"></textarea>
                    </div>
                </div>
                <div class="input-group" style="flex-grow:1;display:flex;flex-direction:column;">
                    <label for="graphStructureInput">图结构数据</label>
                    <textarea id="graphStructureInput" placeholder="[[0,1,5],[1,3,10],[0,2,3],[2,3,4]]" style="flex-grow:1;"></textarea>
                </div>
                <button id="drawGraphBtn" class="draw-btn">绘制通用图/树</button>
                <fieldset>
                    <legend>图算法</legend>
                    <div class="algo-row">
                        <select id="algoSelect">
                            <option value="">选择算法...</option>
                            <option value="bfs">BFS 遍历</option>
                            <option value="dfs">DFS 遍历</option>
                            <option value="dijkstra">Dijkstra 最短路</option>
                            <option value="bellman">Bellman-Ford 最短路</option>
                            <option value="maxflow">最大流 (Edmonds-Karp)</option>
                        </select>
                        <input id="algoStart" type="number" placeholder="起点/源点" min="0">
                        <input id="algoEnd" type="number" placeholder="终点/汇点" min="0" style="display:none;">
                        <input id="algoSpeed" type="range" min="50" max="2000" value="500">
                        <span id="algoSpeedLabel" class="speed-label">500ms</span>
                    </div>
                    <div class="algo-row" style="margin-top:6px;">
                        <button id="algoRunBtn" class="algo-btn">运行</button>
                        <button id="algoStopBtn" class="algo-btn reset">停止</button>
                        <button id="algoResetBtn" class="algo-btn reset">重置着色</button>
                    </div>
                    <p id="algo-result" class="info"></p>
                </fieldset>
                <p id="error-message-general" class="error"></p>
            </div>

            <!-- Tab 1: 二叉树 -->
            <div id="tabContent1" class="tab-content">
                <div class="input-group" style="flex-grow:1;display:flex;flex-direction:column;">
                    <label for="leetcode-input">LeetCode 数组格式</label>
                    <textarea id="leetcode-input" style="flex-grow:1;"></textarea>
                </div>
                <button id="drawTreeBtn" class="draw-btn">绘制二叉树</button>
                <fieldset>
                    <legend>遍历演示</legend>
                    <div class="algo-row">
                        <select id="traversalSelect">
                            <option value="">选择遍历方式...</option>
                            <option value="preorder">前序遍历 (根→左→右)</option>
                            <option value="inorder">中序遍历 (左→根→右)</option>
                            <option value="postorder">后序遍历 (左→右→根)</option>
                        </select>
                        <input id="traversalSpeed" type="range" min="50" max="2000" value="700">
                        <span id="traversalSpeedLabel" class="speed-label">700ms</span>
                    </div>
                    <div class="algo-row" style="margin-top:6px;">
                        <button id="traversalRunBtn" class="algo-btn">运行</button>
                        <button id="traversalStopBtn" class="algo-btn reset">停止</button>
                        <button id="traversalResetBtn" class="algo-btn reset">重置着色</button>
                    </div>
                    <p id="traversal-result" class="info"></p>
                </fieldset>
                <p id="error-message-leetcode" class="error"></p>
            </div>

            <!-- Tab 2: 矩阵 -->
            <div id="tabContent2" class="tab-content">
                <div class="input-group" style="flex-grow:1;display:flex;flex-direction:column;">
                    <label for="matrix-input">矩阵数据 (二维数组)</label>
                    <textarea id="matrix-input" style="flex-grow:1;"></textarea>
                </div>
                <button id="drawMatrixBtn" class="draw-btn">绘制矩阵</button>
                <fieldset>
                    <legend>DP 动态规划</legend>
                    <div class="algo-row">
                        <select id="dpType">
                            <option value="">选择 DP 类型...</option>
                            <option value="minPathSum">最小路径和</option>
                            <option value="maxPathSum">最大路径和</option>
                            <option value="uniquePaths">不同路径数</option>
                        </select>
                        <input id="dpSpeed" type="range" min="20" max="500" value="80">
                        <span id="dpSpeedLabel" class="speed-label">80ms</span>
                    </div>
                    <div class="algo-row" style="margin-top:6px;">
                        <button id="dpRunBtn" class="algo-btn">运行动态规划</button>
                        <button id="dpStopBtn" class="algo-btn reset">停止</button>
                        <button id="dpResetBtn" class="algo-btn reset">重置</button>
                    </div>
                    <p id="dp-result" class="info"></p>
                </fieldset>
                <p id="error-message-matrix" class="error"></p>
            </div>

            <!-- Tab 3: 链表 -->
            <div id="tabContent3" class="tab-content">
                <fieldset>
                    <legend>链表类型</legend>
                    <div class="format-selector">
                        <label><input type="radio" name="listType" value="singly" checked> 单链表</label>
                        <label><input type="radio" name="listType" value="doubly"> 双链表</label>
                        <label><input type="radio" name="listType" value="circular-singly"> 循环单链表</label>
                        <label><input type="radio" name="listType" value="circular-doubly"> 循环双链表</label>
                    </div>
                </fieldset>
                <div class="input-group" style="flex-grow:1;display:flex;flex-direction:column;">
                    <label for="linkedlist-input">链表节点值 (数组格式)</label>
                    <textarea id="linkedlist-input" style="flex-grow:1;"></textarea>
                </div>
                <button id="drawListBtn" class="draw-btn">绘制链表</button>
                <fieldset>
                    <legend>链表算法</legend>
                    <div class="algo-row">
                        <select id="listAlgoSelect">
                            <option value="">选择算法...</option>
                            <option value="reverse">反转链表 (迭代)</option>
                            <option value="findMiddle">找中点 (快慢指针)</option>
                            <option value="detectCycle">检测环 (快慢指针)</option>
                            <option value="removeNth">删除倒数第N个</option>
                        </select>
                        <input id="listAlgoParam" type="number" placeholder="n" min="1" style="width:70px;display:none;">
                        <input id="listAlgoSpeed" type="range" min="50" max="2000" value="700">
                        <span id="listAlgoSpeedLabel" class="speed-label">700ms</span>
                    </div>
                    <div class="algo-row" style="margin-top:6px;">
                        <button id="listAlgoRunBtn" class="algo-btn">运行</button>
                        <button id="listAlgoStopBtn" class="algo-btn reset">停止</button>
                        <button id="listAlgoResetBtn" class="algo-btn reset">重置着色</button>
                    </div>
                    <p id="listAlgo-result" class="info"></p>
                </fieldset>
                <p id="error-message-linkedlist" class="error"></p>
            </div>

            <!-- Tab 4: 栈 & 队列 -->
            <div id="tabContent4" class="tab-content">
                <fieldset>
                    <legend>数据结构模式</legend>
                    <div class="format-selector">
                        <label><input type="radio" name="sqMode" value="stack" checked> 栈 (Stack)</label>
                        <label><input type="radio" name="sqMode" value="queue"> 队列 (Queue)</label>
                    </div>
                </fieldset>
                <div class="algo-row">
                    <input id="sqValueInput" type="text" placeholder="输入值" style="flex:1;min-width:160px;">
                    <button id="sqPushBtn" class="algo-btn">Push</button>
                    <button id="sqPopBtn" class="algo-btn reset">Pop</button>
                    <button id="sqClearBtn" class="algo-btn reset">清空</button>
                </div>
                <p id="sq-info" class="info" style="min-height:40px;"></p>
            </div>
        </div>

        <div class="graph-container">
            <div id="mynetwork"></div>
            <div id="struct-view">
                <div id="sq-display-wrap" class="sq-display-wrap">
                    <span class="sq-marker sq-marker-start"></span>
                    <div id="sq-display" class="sq-display"></div>
                    <span class="sq-marker sq-marker-end"></span>
                </div>
                <div id="sq-popped-section" class="sq-popped-section">
                    <span class="sq-section-title">弹出历史</span>
                    <div id="sq-popped" class="sq-popped"></div>
                </div>
                <div id="sq-log-section" class="sq-log-section">
                    <span class="sq-section-title">操作日志</span>
                    <div id="sq-log" class="sq-log"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>

</html>
